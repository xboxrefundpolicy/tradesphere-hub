<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Manage VPN Products – Tradesphere Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg-primary: #0A0A0A;
            --bg-card: #141414;
            --bg-input: #1E1E1E;
            --border-color: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --accent-gold: #F59E0B;
            --accent-gold-hover: #D97706;
            --radius: 16px;
            --success: #10B981;
            --danger: #EF4444;
            --info: #3B82F6;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 800px; width:100%; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            background: linear-gradient(135deg, var(--accent-gold), #FBBF24);
            color: #000; width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800;
        }
        .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent-gold); }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            transition: 0.3s ease;
        }
        .nav a:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .nav a.active { color: var(--accent-gold); background: rgba(245,158,11,0.1); }

        .page-title { text-align: center; padding: 20px 0 12px; }
        .page-title h1 { font-size: 28px; font-weight: 800; color: var(--accent-gold); }
        .page-title p { color: var(--text-secondary); font-size: 14px; }

        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px; margin: 16px 0;
        }
        .product-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 18px;
            transition: all 0.3s ease;
        }
        .product-card:hover { border-color: var(--accent-gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .product-card .name { font-size: 18px; font-weight: 700; color: var(--accent-gold); }
        .product-card .email { color: var(--text-secondary); font-size: 14px; }
        .product-card .pass { font-family: monospace; background: var(--bg-input); padding: 6px 12px; border-radius: 6px; margin: 6px 0; display: inline-block; border: 1px solid var(--border-color); }
        .product-card .rules { font-size: 13px; color: var(--text-secondary); margin-top: 6px; background: var(--bg-input); padding: 6px 12px; border-radius: 6px; border-left: 2px solid var(--accent-gold); }
        .product-card .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        .product-card .actions .del-btn {
            background: rgba(239,68,68,0.1); color: var(--danger); border: none;
            padding: 6px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px;
        }
        .product-card .actions .del-btn:hover { background: rgba(239,68,68,0.25); }
        .product-card .actions .copy-btn {
            background: rgba(255,255,255,0.06); color: var(--text-secondary); border: 1px solid var(--border-color);
            padding: 6px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px;
        }
        .product-card .actions .copy-btn:hover { background: rgba(245,158,11,0.15); color: var(--accent-gold); border-color: var(--accent-gold); }

        .add-form {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 24px; margin-top: 20px;
        }
        .add-form h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .add-form .sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
        .add-form input, .add-form textarea {
            width: 100%; padding: 11px 14px; background: var(--bg-input);
            border: 1px solid var(--border-color); border-radius: 10px;
            color: var(--text-primary); font-size: 14px; margin-bottom: 12px;
            transition: border 0.3s ease; font-family: inherit;
        }
        .add-form input:focus, .add-form textarea:focus { outline: none; border-color: var(--accent-gold); }
        .add-form textarea { min-height: 50px; resize: vertical; }
        .add-form .btn {
            padding: 12px 24px; background: var(--accent-gold); color: #000;
            border: none; border-radius: 10px; font-weight: 700; font-size: 15px;
            cursor: pointer; transition: 0.3s ease; width: 100%;
        }
        .add-form .btn:hover { background: var(--accent-gold-hover); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

        .back-link {
            display: inline-block; margin-top: 16px; color: var(--accent-gold);
            text-decoration: none; font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }

        .toast {
            position: fixed; bottom: 24px; right: 24px; padding: 14px 24px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; color: var(--text-primary); font-size: 14px; font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 2000;
            transform: translateY(100px); opacity: 0; transition: all 0.4s ease; max-width: 360px;
        }
        .toast.visible { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success); border-left: 4px solid var(--success); }
        .toast.error { border-color: var(--danger); border-left: 4px solid var(--danger); }
        .toast.info { border-color: var(--accent-gold); border-left: 4px solid var(--accent-gold); }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo" onclick="window.location.reload()">
            <div class="logo-icon">TS</div>
            <div class="logo-text">Tradesphere<span>Hub</span></div>
        </div>
        <nav class="nav">
            <!-- 🔥 SIMPLE FIX: Go back using browser history -->
            <a href="#" onclick="window.history.back(); return false;" class="active">🔐 Back to Vault</a>
        </nav>
    </header>

    <div class="page-title">
        <h1>📁 VPN Products</h1>
        <p>Manage all your VPN accounts here.</p>
    </div>

    <div id="productList" class="product-grid"></div>

    <div class="add-form">
        <h2>➕ Add New VPN</h2>
        <div class="sub">Enter the VPN details below.</div>
        <input type="text" id="productName" placeholder="VPN Name (e.g. ExpressVPN)" />
        <input type="email" id="productEmail" placeholder="VPN Email" />
        <input type="text" id="productPassword" placeholder="VPN Password" />
        <textarea id="productRules" placeholder="Rules (optional)"></textarea>
        <button class="btn" id="addProductBtn">➕ Add VPN Product</button>
    </div>

    <!-- Fallback back link -->
    <a href="#" onclick="window.history.back(); return false;" class="back-link">← Go Back to VPN Vault</a>
</div>

<div class="toast" id="toast"></div>

<script>
    (function() {
        'use strict';

        const STORAGE_PRODUCTS_KEY = 'tradesphere_vpn_products';
        let products = [];

        function loadProducts() {
            try { const data = localStorage.getItem(STORAGE_PRODUCTS_KEY); if (data) { products = JSON.parse(data); } else { products = []; } } catch (e) { products = []; }
            return products;
        }

        function saveProducts() { localStorage.setItem(STORAGE_PRODUCTS_KEY, JSON.stringify(products)); }

        function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            type = type || 'info';
            toast.textContent = message;
            toast.className = 'toast ' + type + ' visible';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(function() { toast.classList.remove('visible'); }, 3000);
        }

        function copyToClipboard(text, successMsg) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showToast(successMsg || '✅ Copied!', 'success');
                }).catch(function() { fallbackCopy(text, successMsg); });
            } else { fallbackCopy(text, successMsg); }
        }

        function fallbackCopy(text, successMsg) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast(successMsg || '✅ Copied!', 'success');
        }

        function renderProducts() {
            loadProducts();
            const container = document.getElementById('productList');
            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>No VPN products added yet.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            products.forEach(function(p) {
                html += `
                    <div class="product-card">
                        <div class="name">🔐 ${escapeHtml(p.name)}</div>
                        <div class="email">📧 ${escapeHtml(p.email)}</div>
                        <div class="pass">🔑 ${escapeHtml(p.password)}</div>
                        ${p.rules ? `<div class="rules">📋 ${escapeHtml(p.rules)}</div>` : ''}
                        <div class="actions">
                            <button class="copy-btn" data-text="${escapeHtml(p.email)}">📋 Copy Email</button>
                            <button class="copy-btn" data-text="${escapeHtml(p.password)}">📋 Copy Password</button>
                            <button class="del-btn" data-id="${p.id}">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            document.querySelectorAll('.copy-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const text = this.dataset.text;
                    copyToClipboard(text, '✅ Copied!');
                });
            });

            document.querySelectorAll('.del-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    if (confirm('Delete this VPN product?')) {
                        products = products.filter(p => p.id !== id);
                        saveProducts();
                        renderProducts();
                        showToast('Product deleted.', 'info');
                    }
                });
            });
        }

        function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const email = document.getElementById('productEmail').value.trim();
            const password = document.getElementById('productPassword').value.trim();
            const rules = document.getElementById('productRules').value.trim();

            if (!name) { showToast('Please enter VPN name.', 'error'); return; }
            if (!email) { showToast('Please enter VPN email.', 'error'); return; }
            if (!password) { showToast('Please enter VPN password.', 'error'); return; }

            products.push({ id: generateId(), name: name, email: email, password: password, rules: rules });
            saveProducts();
            renderProducts();
            document.getElementById('productName').value = '';
            document.getElementById('productEmail').value = '';
            document.getElementById('productPassword').value = '';
            document.getElementById('productRules').value = '';
            showToast('✅ VPN product added!', 'success');
        }

        document.getElementById('addProductBtn').addEventListener('click', addProduct);
        renderProducts();

        console.log('📁 VPN Products Management loaded');
        console.log('📦 Products:', products.length);

    })();
</script>

</body>
</html>
